<svg width="560" height="588" viewBox="0 0 560 588" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="diagLinesAbout" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #11151c; stroke: url(#borderGrad); stroke-width: 1.5; rx: 16; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: url(#titleGrad); }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .value { font-family: 'Segoe UI', Arial, sans-serif; font-size: 17px; fill: #c9d1d9; }
      .row { fill: none; stroke: #30363d; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="560" height="588" rx="20"/>
  <rect width="560" height="588" rx="20" fill="url(#diagLinesAbout)"/>
  <rect class="card" x="6" y="6" width="548" height="576" rx="16" fill="none"/>

  <text x="32" y="50" class="title">📌 About Me</text>

  <!-- Row 1 -->
  <rect class="row" x="28" y="76" width="504" height="76"/>
  <circle cx="52" cy="106" r="6" fill="#3FB950"/>
  <text x="72" y="101" class="label" fill="#7EE787">Currently working on</text>
  <text x="72" y="128" class="value">A vulnerability management automation project</text>

  <!-- Row 2 -->
  <rect class="row" x="28" y="160" width="504" height="76"/>
  <circle cx="52" cy="190" r="6" fill="#A78BFA"/>
  <text x="72" y="185" class="label" fill="#C4B5FD">Currently pursuing</text>
  <text x="72" y="212" class="value">CISSP</text>

  <!-- Row 3 -->
  <rect class="row" x="28" y="244" width="504" height="76"/>
  <circle cx="52" cy="274" r="6" fill="#58A6FF"/>
  <text x="72" y="269" class="label" fill="#79C0FF">Looking to collaborate on</text>
  <text x="72" y="296" class="value">Agentic AI projects</text>

  <!-- Row 4 -->
  <rect class="row" x="28" y="328" width="504" height="76"/>
  <circle cx="52" cy="358" r="6" fill="#F2CC60"/>
  <text x="72" y="353" class="label" fill="#F2CC60">Ask me about</text>
  <text x="72" y="380" class="value">The latest cybersecurity news</text>

  <!-- Row 5 -->
  <rect class="row" x="28" y="412" width="504" height="76"/>
  <circle cx="52" cy="442" r="6" fill="#F783AC"/>
  <text x="72" y="437" class="label" fill="#F783AC">Reach me at</text>
  <text x="72" y="464" class="value">Ward_official@protonmail.com</text>

  <!-- Row 6 -->
  <rect class="row" x="28" y="496" width="504" height="76"/>
  <circle cx="52" cy="526" r="6" fill="#7EE787"/>
  <text x="72" y="521" class="label" fill="#7EE787">Fun fact</text>
  <text x="72" y="548" class="value">I have over 300 books and can tell you exactly</text>
  <text x="72" y="571" class="value">where any one of them is on the shelf.</text>

  <defs>
    <clipPath id="cardClipAbout">
      <rect x="6" y="6" width="548" height="576" rx="16"/>
    </clipPath>
    <linearGradient id="glowBarAbout" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#A9FEF7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="-60" width="548" height="60" fill="url(#glowBarAbout)" clip-path="url(#cardClipAbout)">
    <animate attributeName="y" values="-60;588" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
