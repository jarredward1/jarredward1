<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #11151c; stroke: url(#borderGrad); stroke-width: 1.5; rx: 16; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 30px; font-weight: 700; fill: url(#titleGrad); }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .value { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; fill: #c9d1d9; }
      .row { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="900" height="420" rx="20"/>
  <rect class="card" x="6" y="6" width="888" height="408" rx="16" fill="none"/>

  <text x="40" y="55" class="title">About Me</text>

  <!-- Row 1 -->
  <rect class="row" x="32" y="78" width="836" height="48"/>
  <circle cx="60" cy="102" r="6" fill="#3FB950"/>
  <text x="84" y="96" class="label" fill="#7EE787">Currently working on</text>
  <text x="84" y="116" class="value">Building out my cybersecurity &amp; GRC project portfolio</text>

  <!-- Row 2 -->
  <rect class="row" x="32" y="134" width="836" height="48"/>
  <circle cx="60" cy="158" r="6" fill="#A78BFA"/>
  <text x="84" y="152" class="label" fill="#C4B5FD">Currently learning</text>
  <text x="84" y="172" class="value">Microsoft SC-500 (Cloud and AI Security Engineer Associate)</text>

  <!-- Row 3 -->
  <rect class="row" x="32" y="190" width="836" height="48"/>
  <circle cx="60" cy="214" r="6" fill="#58A6FF"/>
  <text x="84" y="208" class="label" fill="#79C0FF">Looking to collaborate on</text>
  <text x="84" y="228" class="value">Vulnerability management and GRC automation</text>

  <!-- Row 4 -->
  <rect class="row" x="32" y="246" width="836" height="48"/>
  <circle cx="60" cy="270" r="6" fill="#F2CC60"/>
  <text x="84" y="264" class="label" fill="#F2CC60">Ask me about</text>
  <text x="84" y="284" class="value">NIST CSF/RMF, PCI DSS, vulnerability management</text>

