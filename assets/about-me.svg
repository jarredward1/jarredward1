<svg width="640" height="90" viewBox="0 0 640 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradProjects" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGradProjects" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="diagLinesProjects" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .bgProjects { fill: #0d1117; }
      .titleProjects { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: url(#titleGradProjects); }
    </style>
  </defs>

  <rect class="bgProjects" width="640" height="90" rx="18"/>
  <rect width="640" height="90" rx="18" fill="url(#diagLinesProjects)"/>
  <rect x="5" y="5" width="630" height="80" rx="14" fill="none" stroke="url(#borderGradProjects)" stroke-width="1.5"/>

  <text x="32" y="52" class="titleProjects">📌 About Me</text>

  <defs>
    <clipPath id="cardClipProjects">
      <rect x="5" y="5" width="630" height="80" rx="14"/>
    </clipPath>
    <linearGradient id="glowBarProjects" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#A9FEF7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="5" y="-30" width="630" height="30" fill="url(#glowBarProjects)" clip-path="url(#cardClipProjects)">
    <animate attributeName="y" values="-30;90" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
