  <rect class="row" x="32" y="302" width="836" height="48"/>
  <circle cx="60" cy="326" r="6" fill="#F783AC"/>
  <text x="84" y="320" class="label" fill="#F783AC">Reach me at</text>
  <text x="84" y="340" class="value">Ward_official@protonmail.com</text>

  <!-- Row 6 -->
  <rect class="row" x="32" y="358" width="836" height="48"/>
  <circle cx="60" cy="382" r="6" fill="#7EE787"/>
  <text x="84" y="376" class="label" fill="#7EE787">Fun fact</text>
  <text x="84" y="396" class="value">I have over 300 books and can tell you exactly where any one of them is on the shelf.</text>
</svg>
