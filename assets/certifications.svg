<svg width="640" height="612" viewBox="0 0 640 612" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="diagLinesCerts" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .bg4 { fill: #0d1117; }
      .title4 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: url(#titleGrad4); }
      .label4 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #c9d1d9; }
      .sub4 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .row4 { fill: none; stroke: #30363d; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect class="bg4" width="640" height="612" rx="20"/>
  <rect width="640" height="612" rx="20" fill="url(#diagLinesCerts)"/>
  <rect x="6" y="6" width="628" height="600" rx="16" fill="none" stroke="url(#borderGrad4)" stroke-width="1.5"/>

  <text x="32" y="50" class="title4">📜 Certifications</text>

  <!-- Cert 1 -->
  <rect class="row4" x="28" y="76" width="584" height="92"/>
  <text x="52" y="118" font-size="26" text-anchor="middle">✅</text>
  <text x="84" y="112" class="label4">Google Cybersecurity Certificate</text>
  <text x="84" y="138" class="sub4" fill="#7EE787">Earned</text>

  <!-- Cert 2 -->
  <rect class="row4" x="28" y="180" width="584" height="92"/>
  <text x="52" y="222" font-size="26" text-anchor="middle">✅</text>
  <text x="84" y="216" class="label4">CompTIA Network+</text>
  <text x="84" y="242" class="sub4" fill="#7EE787">Earned</text>

  <!-- Cert 3 -->
  <rect class="row4" x="28" y="284" width="584" height="92"/>
  <text x="52" y="326" font-size="26" text-anchor="middle">✅</text>
  <text x="84" y="320" class="label4">CompTIA Security+</text>
  <text x="84" y="346" class="sub4" fill="#7EE787">Earned</text>

  <!-- Cert 4 -->
  <rect class="row4" x="28" y="388" width="584" height="92"/>
  <text x="52" y="430" font-size="26" text-anchor="middle">✅</text>
  <text x="84" y="416" class="label4">Microsoft Certified: Security, Compliance,</text>
  <text x="84" y="438" class="label4">and Identity Fundamentals (SC-900)</text>
  <text x="84" y="464" class="sub4" fill="#7EE787">Earned</text>

  <!-- Cert 5 -->
  <rect class="row4" x="28" y="500" width="584" height="92"/>
  <text x="52" y="542" font-size="26" text-anchor="middle">🟡</text>
  <text x="84" y="528" class="label4">Certified Information Systems Security</text>
  <text x="84" y="550" class="label4">Professional (CISSP)</text>
  <text x="84" y="576" class="sub4" fill="#F2CC60">In Progress · Nov 2026</text>

  <defs>
    <clipPath id="cardClipCerts">
      <rect x="6" y="6" width="628" height="600" rx="16"/>
    </clipPath>
    <linearGradient id="glowBarCerts" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="-60" width="628" height="60" fill="url(#glowBarCerts)" clip-path="url(#cardClipCerts)">
    <animate attributeName="y" values="-60;612" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
