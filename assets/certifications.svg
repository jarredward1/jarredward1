<svg width="900" height="460" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="diagLinesCerts" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .bg4 { fill: #0d1117; }
      .title4 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 32px; font-weight: 700; fill: url(#titleGrad4); }
      .label4 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #c9d1d9; }
      .tag { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .row4 { fill: none; stroke: #30363d; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect class="bg4" width="900" height="460" rx="20"/>
  <rect width="900" height="460" rx="20" fill="url(#diagLinesCerts)"/>
  <rect x="6" y="6" width="888" height="448" rx="16" fill="none" stroke="url(#borderGrad4)" stroke-width="1.5"/>

  <text x="40" y="55" class="title4">📜 Certifications</text>

  <rect class="row4" x="32" y="86" width="836" height="50"/>
  <circle cx="60" cy="111" r="6" fill="#7EE787"/>
  <text x="84" y="116" class="label4">Google Cybersecurity Certificate</text>
  <text x="826" y="117" class="tag" fill="#7EE787" text-anchor="middle">✅</text>

  <rect class="row4" x="32" y="158" width="836" height="50"/>
  <circle cx="60" cy="183" r="6" fill="#7EE787"/>
  <text x="84" y="188" class="label4">CompTIA Network+</text>
  <text x="826" y="189" class="tag" fill="#7EE787" text-anchor="middle">✅</text>

  <rect class="row4" x="32" y="230" width="836" height="50"/>
  <circle cx="60" cy="255" r="6" fill="#7EE787"/>
  <text x="84" y="260" class="label4">CompTIA Security+</text>
  <text x="826" y="261" class="tag" fill="#7EE787" text-anchor="middle">✅</text>

  <rect class="row4" x="32" y="302" width="836" height="50"/>
  <circle cx="60" cy="327" r="6" fill="#7EE787"/>
  <text x="84" y="332" class="label4">Microsoft Certified: Security, Compliance, and Identity Fundamentals (SC-900)</text>
  <text x="826" y="333" class="tag" fill="#7EE787" text-anchor="middle">✅</text>

  <rect class="row4" x="32" y="374" width="836" height="50"/>
  <circle cx="60" cy="399" r="6" fill="#F2CC60"/>
  <text x="84" y="404" class="label4">Microsoft Certified: Cloud and AI Security Engineer Associate (SC-500)</text>
  <rect x="744" y="386" width="104" height="26" rx="13" fill="#2b2308" stroke="#F2CC60"/>
  <text x="796" y="404" class="tag" fill="#F2CC60" text-anchor="middle">Nov 2026</text>
  <defs>
    <clipPath id="cardClipCerts">
      <rect x="6" y="6" width="888" height="448" rx="16"/>
    </clipPath>
    <linearGradient id="glowBarCerts" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="-60" width="888" height="60" fill="url(#glowBarCerts)" clip-path="url(#cardClipCerts)">
    <animate attributeName="y" values="-60;460" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
