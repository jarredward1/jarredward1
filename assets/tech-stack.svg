<svg width="640" height="630" viewBox="0 0 640 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="diagLinesTech" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .bg2 { fill: #0d1117; }
      .title2 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: url(#titleGrad2); }
      .group { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #8b949e; letter-spacing: 1.5px; }
      .badge { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 8; }
      .badgetext { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #c9d1d9; }
    </style>
  </defs>

  <rect class="bg2" width="640" height="630" rx="20"/>
  <rect width="640" height="630" rx="20" fill="url(#diagLinesTech)"/>
  <rect x="6" y="6" width="628" height="618" rx="16" fill="none" stroke="url(#borderGrad2)" stroke-width="1.5"/>

  <text x="32" y="48" class="title2">🛠️ Tech Stack</text>

  <!-- GRC & Frameworks (6 items -> 2 rows of 3) -->
  <text x="32" y="84" class="group">GRC &amp; FRAMEWORKS</text>
  <g>
    <rect class="badge" x="32" y="96" width="160" height="36"/><circle cx="50" cy="114" r="5" fill="#58A6FF"/><text x="64" y="119" class="badgetext">NIST 800-37</text>
    <rect class="badge" x="202" y="96" width="160" height="36"/><circle cx="220" cy="114" r="5" fill="#58A6FF"/><text x="234" y="119" class="badgetext">NIST 800-53</text>
    <rect class="badge" x="372" y="96" width="160" height="36"/><circle cx="390" cy="114" r="5" fill="#58A6FF"/><text x="404" y="119" class="badgetext">NIST 800-61</text>
    <rect class="badge" x="32" y="140" width="140" height="36"/><circle cx="50" cy="158" r="5" fill="#58A6FF"/><text x="64" y="163" class="badgetext">ISO 27001</text>
    <rect class="badge" x="182" y="140" width="130" height="36"/><circle cx="200" cy="158" r="5" fill="#58A6FF"/><text x="214" y="163" class="badgetext">PCI DSS</text>
    <rect class="badge" x="322" y="140" width="160" height="36"/><circle cx="340" cy="158" r="5" fill="#58A6FF"/><text x="354" y="163" class="badgetext">DISA STIGs</text>
  </g>

  <!-- Security Tooling (3 items -> 1 row) -->
  <text x="32" y="212" class="group">SECURITY TOOLING</text>
  <g>
    <rect class="badge" x="32" y="224" width="120" height="36"/><circle cx="50" cy="242" r="5" fill="#3FB950"/><text x="64" y="247" class="badgetext">Tenable</text>
    <rect class="badge" x="162" y="224" width="220" height="36"/><circle cx="180" cy="242" r="5" fill="#3FB950"/><text x="194" y="247" class="badgetext">Microsoft Sentinel</text>
    <rect class="badge" x="392" y="224" width="220" height="36"/><circle cx="410" cy="242" r="5" fill="#3FB950"/><text x="424" y="247" class="badgetext">Microsoft Defender</text>
  </g>

  <!-- Cloud & Infra (4 items -> 2 rows) -->
  <text x="32" y="308" class="group">CLOUD &amp; INFRASTRUCTURE</text>
  <g>
    <rect class="badge" x="32" y="320" width="110" height="36"/><circle cx="50" cy="338" r="5" fill="#A78BFA"/><text x="64" y="343" class="badgetext">Azure</text>
    <rect class="badge" x="152" y="320" width="190" height="36"/><circle cx="170" cy="338" r="5" fill="#A78BFA"/><text x="184" y="343" class="badgetext">Windows Server</text>
    <rect class="badge" x="352" y="320" width="190" height="36"/><circle cx="370" cy="338" r="5" fill="#A78BFA"/><text x="384" y="343" class="badgetext">Active Directory</text>
    <rect class="badge" x="32" y="364" width="130" height="36"/><circle cx="50" cy="382" r="5" fill="#A78BFA"/><text x="64" y="387" class="badgetext">Entra ID</text>
  </g>

  <!-- Scripting (3 items -> 1 row) -->
  <text x="32" y="436" class="group">SCRIPTING &amp; QUERY</text>
  <g>
    <rect class="badge" x="32" y="448" width="160" height="36"/><circle cx="50" cy="466" r="5" fill="#F2CC60"/><text x="64" y="471" class="badgetext">PowerShell</text>
    <rect class="badge" x="202" y="448" width="120" height="36"/><circle cx="220" cy="466" r="5" fill="#F2CC60"/><text x="234" y="471" class="badgetext">Python</text>
    <rect class="badge" x="332" y="448" width="100" height="36"/><circle cx="350" cy="466" r="5" fill="#F2CC60"/><text x="364" y="471" class="badgetext">KQL</text>
  </g>

  <!-- Web/Infra (3 items -> 1 row) -->
  <text x="32" y="540" class="group">WEB &amp; DEPLOYMENT</text>
  <g>
    <rect class="badge" x="32" y="552" width="120" height="36"/><circle cx="50" cy="570" r="5" fill="#F783AC"/><text x="64" y="575" class="badgetext">Docker</text>
    <rect class="badge" x="162" y="552" width="120" height="36"/><circle cx="180" cy="570" r="5" fill="#F783AC"/><text x="194" y="575" class="badgetext">NGINX</text>
    <rect class="badge" x="292" y="552" width="150" height="36"/><circle cx="310" cy="570" r="5" fill="#F783AC"/><text x="324" y="575" class="badgetext">WordPress</text>
  </g>

  <defs>
    <clipPath id="cardClipTech">
      <rect x="6" y="6" width="628" height="618" rx="16"/>
    </clipPath>
    <linearGradient id="glowBarTech" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A9FEF7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#A9FEF7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="-60" width="628" height="60" fill="url(#glowBarTech)" clip-path="url(#cardClipTech)">
    <animate attributeName="y" values="-60;630" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
