  <text x="40" y="295" class="group">SCRIPTING &amp; QUERY</text>
  <g>
    <rect class="badge" x="40" y="305" width="130" height="34"/><circle cx="58" cy="322" r="5" fill="#F2CC60"/><text x="72" y="327" class="badgetext">PowerShell</text>
    <rect class="badge" x="178" y="305" width="100" height="34"/><circle cx="196" cy="322" r="5" fill="#F2CC60"/><text x="210" y="327" class="badgetext">Python</text>
    <rect class="badge" x="286" y="305" width="90" height="34"/><circle cx="304" cy="322" r="5" fill="#F2CC60"/><text x="318" y="327" class="badgetext">KQL</text>
  </g>

  <!-- Web/Infra -->
  <text x="40" y="365" class="group">WEB &amp; DEPLOYMENT</text>
  <g>
    <rect class="badge" x="40" y="375" width="100" height="34"/><circle cx="58" cy="392" r="5" fill="#F783AC"/><text x="72" y="397" class="badgetext">Docker</text>
    <rect class="badge" x="148" y="375" width="100" height="34"/><circle cx="166" cy="392" r="5" fill="#F783AC"/><text x="180" y="397" class="badgetext">NGINX</text>
    <rect class="badge" x="256" y="375" width="130" height="34"/><circle cx="274" cy="392" r="5" fill="#F783AC"/><text x="288" y="397" class="badgetext">WordPress</text>
  </g>
</svg>
