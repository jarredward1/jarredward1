<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <style>
      .bg2 { fill: #0d1117; }
      .title2 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 30px; font-weight: 700; fill: url(#titleGrad2); }
      .group { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #8b949e; letter-spacing: 1px; }
      .badge { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 8; }
      .badgetext { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #c9d1d9; }
      .dot { }
    </style>
  </defs>

  <rect class="bg2" width="900" height="430" rx="20"/>
  <rect x="6" y="6" width="888" height="418" rx="16" fill="none" stroke="url(#borderGrad2)" stroke-width="1.5"/>

  <text x="40" y="50" class="title2">Tech Stack</text>

  <!-- GRC & Frameworks -->
  <text x="40" y="85" class="group">GRC &amp; FRAMEWORKS</text>
  <g>
    <rect class="badge" x="40" y="95" width="130" height="34"/><circle cx="58" cy="112" r="5" fill="#58A6FF"/><text x="72" y="117" class="badgetext">NIST 800-37</text>
    <rect class="badge" x="178" y="95" width="130" height="34"/><circle cx="196" cy="112" r="5" fill="#58A6FF"/><text x="210" y="117" class="badgetext">NIST 800-53</text>
    <rect class="badge" x="316" y="95" width="130" height="34"/><circle cx="334" cy="112" r="5" fill="#58A6FF"/><text x="348" y="117" class="badgetext">NIST 800-61</text>
    <rect class="badge" x="454" y="95" width="110" height="34"/><circle cx="472" cy="112" r="5" fill="#58A6FF"/><text x="486" y="117" class="badgetext">ISO 27001</text>
    <rect class="badge" x="572" y="95" width="100" height="34"/><circle cx="590" cy="112" r="5" fill="#58A6FF"/><text x="604" y="117" class="badgetext">PCI DSS</text>
    <rect class="badge" x="680" y="95" width="140" height="34"/><circle cx="698" cy="112" r="5" fill="#58A6FF"/><text x="712" y="117" class="badgetext">DISA STIGs</text>
  </g>

  <!-- Security Tooling -->
  <text x="40" y="155" class="group">SECURITY TOOLING</text>
  <g>
    <rect class="badge" x="40" y="165" width="100" height="34"/><circle cx="58" cy="182" r="5" fill="#3FB950"/><text x="72" y="187" class="badgetext">Tenable</text>
    <rect class="badge" x="148" y="165" width="180" height="34"/><circle cx="166" cy="182" r="5" fill="#3FB950"/><text x="180" y="187" class="badgetext">Microsoft Sentinel</text>
    <rect class="badge" x="336" y="165" width="180" height="34"/><circle cx="354" cy="182" r="5" fill="#3FB950"/><text x="368" y="187" class="badgetext">Microsoft Defender</text>
  </g>

  <!-- Cloud & Infra -->
  <text x="40" y="225" class="group">CLOUD &amp; INFRASTRUCTURE</text>
  <g>
    <rect class="badge" x="40" y="235" width="90" height="34"/><circle cx="58" cy="252" r="5" fill="#A78BFA"/><text x="72" y="257" class="badgetext">Azure</text>
    <rect class="badge" x="138" y="235" width="160" height="34"/><circle cx="156" cy="252" r="5" fill="#A78BFA"/><text x="170" y="257" class="badgetext">Windows Server</text>
    <rect class="badge" x="306" y="235" width="160" height="34"/><circle cx="324" cy="252" r="5" fill="#A78BFA"/><text x="338" y="257" class="badgetext">Active Directory</text>
  </g>

