<svg width="640" height="220" viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grc_analyst_project" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <pattern id="diagLines_grc_analyst_project" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <style>
      .bg { fill: #0d1117; }
      .cat { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; fill: #3FB950; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #e6edf3; }
      .desc { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #9aa4b2; }
      .tag { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #c9d1d9; }
      .arrow { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #58A6FF; }
    </style>
  </defs>
  <rect class="bg" width="640" height="220" rx="14"/>
  <rect width="640" height="220" rx="14" fill="url(#diagLines_grc_analyst_project)"/>
  <rect x="3" y="3" width="634" height="214" rx="12" fill="none" stroke="url(#bg_grc_analyst_project)" stroke-width="1.4"/>
  <text x="28" y="34" class="cat">GRC</text>
  <text x="28" y="64" class="title">GRC Analyst Project</text>
  <text x="28" y="94" class="desc">Security posture and gap analysis against NIST CSF 2.0's</text>
  <text x="28" y="116" class="desc">six core functions — current Tier 1 (Partial) to target</text>
  <text x="28" y="138" class="desc">Tier 4 (Adaptive) roadmap.</text>

  <rect x="28" y="156" width="140" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="44" cy="170" r="5" fill="#3FB950"/>
  <text x="56" y="174" class="tag">NIST CSF 2.0</text>

  <rect x="176" y="156" width="146" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="192" cy="170" r="5" fill="#3FB950"/>
  <text x="204" y="174" class="tag">MITRE ATT&amp;CK</text>

  <rect x="330" y="156" width="100" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="346" cy="170" r="5" fill="#3FB950"/>
  <text x="358" y="174" class="tag">OWASP</text>

  <text x="616" y="198" class="arrow" text-anchor="end">View Project →</text>
  <defs>
    <clipPath id="cardClipGrcAnalystProject">
      <rect x="3" y="3" width="634" height="214" rx="12"/>
    </clipPath>
    <linearGradient id="glowBarGrcAnalystProject" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3FB950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3FB950" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3FB950" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="3" y="-40" width="634" height="40" fill="url(#glowBarGrcAnalystProject)" clip-path="url(#cardClipGrcAnalystProject)">
    <animate attributeName="y" values="-40;220" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
