<svg width="640" height="220" viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_enterprise_network_system_implementation" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <pattern id="diagLines_enterprise_network_system_implementation" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <style>
      .bg { fill: #0d1117; }
      .cat { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; fill: #58A6FF; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #e6edf3; }
      .desc { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; fill: #9aa4b2; }
      .tag { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #c9d1d9; }
      .arrow { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #58A6FF; }
    </style>
  </defs>
  <rect class="bg" width="640" height="220" rx="14"/>
  <rect width="640" height="220" rx="14" fill="url(#diagLines_enterprise_network_system_implementation)"/>
  <rect x="3" y="3" width="634" height="214" rx="12" fill="none" stroke="url(#bg_enterprise_network_system_implementation)" stroke-width="1.4"/>
  <text x="28" y="34" class="cat">NETWORK &amp; SYSTEMS</text>
  <text x="28" y="64" class="title">Enterprise Network Implementation</text>
  <text x="28" y="94" class="desc">Full network buildout for a fictional law firm: LAN design,</text>
  <text x="28" y="116" class="desc">hardware procurement, and Windows Server 2022,</text>
  <text x="28" y="138" class="desc">delivered $9.2K under a $60K budget.</text>

  <rect x="28" y="156" width="180" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="44" cy="170" r="5" fill="#58A6FF"/>
  <text x="56" y="174" class="tag">Windows Server 2022</text>

  <rect x="216" y="156" width="124" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="232" cy="170" r="5" fill="#58A6FF"/>
  <text x="244" y="174" class="tag">LAN Design</text>

  <rect x="348" y="156" width="128" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
  <circle cx="364" cy="170" r="5" fill="#58A6FF"/>
  <text x="376" y="174" class="tag">Budget Mgmt</text>

  <text x="616" y="198" class="arrow" text-anchor="end">View Project →</text>
  <defs>
    <clipPath id="cardClipEnterpriseNetworkSystemImplementation">
      <rect x="3" y="3" width="634" height="214" rx="12"/>
    </clipPath>
    <linearGradient id="glowBarEnterpriseNetworkSystemImplementation" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="3" y="-40" width="634" height="40" fill="url(#glowBarEnterpriseNetworkSystemImplementation)" clip-path="url(#cardClipEnterpriseNetworkSystemImplementation)">
    <animate attributeName="y" values="-40;220" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
