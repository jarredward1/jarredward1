<svg width="420" height="190" viewBox="0 0 420 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_threat_hunts" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <style>
      .bg { fill: #0d1117; }
      .cat { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; fill: #F2CC60; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #e6edf3; }
      .desc { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12.5px; fill: #9aa4b2; }
      .lang { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #c9d1d9; }
      .arrow { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #58A6FF; }
    </style>
  </defs>
  <rect class="bg" width="420" height="190" rx="14"/>
  <rect x="3" y="3" width="414" height="184" rx="12" fill="none" stroke="url(#bg_threat_hunts)" stroke-width="1.4"/>
  <text x="24" y="34" class="cat">SECURITY OPS</text>
  <text x="24" y="62" class="title">Threat Hunts</text>
  <text x="24" y="96" class="desc">Hypothesis-driven threat hunts on live cyber</text>
  <text x="24" y="116" class="desc">ranges: M365/Azure AD compromise, BEC, and</text>
  <text x="24" y="136" class="desc">TOR misuse, traced via KQL in Microsoft</text>
  <text x="24" y="156" class="desc">Sentinel and Defender XDR.</text>
  <text x="396" y="170" class="arrow" text-anchor="end">View repo &#8599;</text>
  <defs>
    <clipPath id="cardClipThreatHunts">
      <rect x="3" y="3" width="414" height="184" rx="12"/>
    </clipPath>
    <linearGradient id="glowBarThreatHunts" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2CC60" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F2CC60" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#F2CC60" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="3" y="-30" width="414" height="30" fill="url(#glowBarThreatHunts)" clip-path="url(#cardClipThreatHunts)">
    <animate attributeName="y" values="-30;190" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
