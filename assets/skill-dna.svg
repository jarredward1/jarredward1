<svg width="640" height="560" viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3FB950"/><stop offset="100%" stop-color="#7EE787"/></linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#C4B5FD"/></linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#58A6FF"/><stop offset="100%" stop-color="#79C0FF"/></linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F2CC60"/><stop offset="100%" stop-color="#F7DE8F"/></linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#58A6FF"/><stop offset="100%" stop-color="#79C0FF"/></linearGradient>
    <pattern id="diagLinesSkill" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#A9FEF7" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <style>
      .bg3 { fill: #0d1117; }
      .title3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: url(#titleGrad3); }
      .sub3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; fill: #6e7681; }
      .label3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #c9d1d9; }
      .pct3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #A78BFA; }
      .track { fill: #161b22; rx: 9; }
    </style>
  </defs>

  <rect class="bg3" width="640" height="560" rx="20"/>
  <rect width="640" height="560" rx="20" fill="url(#diagLinesSkill)"/>
  <rect x="6" y="6" width="628" height="548" rx="16" fill="none" stroke="url(#borderGrad3)" stroke-width="1.5"/>

  <text x="32" y="46" class="title3">🧬 Skill DNA</text>
  <text x="32" y="68" class="sub3">Portfolio focus by domain (estimated emphasis, not a precise score)</text>

  <!-- GRC & Compliance 30% -->
  <circle cx="48" cy="110" r="6" fill="#3FB950"/>
  <text x="68" y="116" class="label3">GRC &amp; Compliance</text>
  <text x="608" y="116" class="pct3" text-anchor="end">30%</text>
  <rect class="track" x="32" y="128" width="576" height="18"/>
  <rect x="32" y="128" width="173" height="18" rx="9" fill="url(#bar1)"/>

  <!-- Vulnerability Management 20% -->
  <circle cx="48" cy="186" r="6" fill="#A78BFA"/>
  <text x="68" y="192" class="label3">Vulnerability Management</text>
  <text x="608" y="192" class="pct3" text-anchor="end">20%</text>
  <rect class="track" x="32" y="204" width="576" height="18"/>
  <rect x="32" y="204" width="115" height="18" rx="9" fill="url(#bar2)"/>

  <!-- Cloud & Identity 15% -->
  <circle cx="48" cy="262" r="6" fill="#58A6FF"/>
  <text x="68" y="268" class="label3">Cloud &amp; Identity</text>
  <text x="608" y="268" class="pct3" text-anchor="end">15%</text>
  <rect class="track" x="32" y="280" width="576" height="18"/>
  <rect x="32" y="280" width="86" height="18" rx="9" fill="url(#bar3)"/>

  <!-- Security Operations 20% -->
  <circle cx="48" cy="338" r="6" fill="#F2CC60"/>
  <text x="68" y="344" class="label3">Security Operations</text>
  <text x="608" y="344" class="pct3" text-anchor="end">20%</text>
  <rect class="track" x="32" y="356" width="576" height="18"/>
  <rect x="32" y="356" width="115" height="18" rx="9" fill="url(#bar4)"/>

  <!-- Network & Systems 15% -->
  <circle cx="48" cy="414" r="6" fill="#79C0FF"/>
  <text x="68" y="420" class="label3">Network &amp; Systems</text>
  <text x="608" y="420" class="pct3" text-anchor="end">15%</text>
  <rect class="track" x="32" y="432" width="576" height="18"/>
  <rect x="32" y="432" width="86" height="18" rx="9" fill="url(#bar5)"/>

  <defs>
    <clipPath id="cardClipSkill">
      <rect x="6" y="6" width="628" height="548" rx="16"/>
    </clipPath>
    <linearGradient id="glowBarSkill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3FB950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3FB950" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3FB950" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="-60" width="628" height="60" fill="url(#glowBarSkill)" clip-path="url(#cardClipSkill)">
    <animate attributeName="y" values="-60;560" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
