<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="titleGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3FB950"/><stop offset="100%" stop-color="#7EE787"/></linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#58A6FF"/><stop offset="100%" stop-color="#79C0FF"/></linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#C4B5FD"/></linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F2CC60"/><stop offset="100%" stop-color="#F7DE8F"/></linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F783AC"/><stop offset="100%" stop-color="#FAA7C4"/></linearGradient>
    <style>
      .bg3 { fill: #0d1117; }
      .title3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 30px; font-weight: 700; fill: url(#titleGrad3); }
      .sub3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; fill: #6e7681; }
      .label3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #c9d1d9; }
      .pct3 { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #A78BFA; }
      .track { fill: #161b22; rx: 8; }
    </style>
  </defs>

  <rect class="bg3" width="900" height="380" rx="20"/>
  <rect x="6" y="6" width="888" height="368" rx="16" fill="none" stroke="url(#borderGrad3)" stroke-width="1.5"/>

  <text x="40" y="50" class="title3">Skill DNA — Security Domains</text>
  <text x="40" y="72" class="sub3">Based on focus area across 12 public repositories</text>

  <!-- GRC & Compliance 33% -->
  <circle cx="58" cy="108" r="6" fill="#3FB950"/>
  <text x="78" y="113" class="label3">GRC &amp; Compliance</text>
  <text x="820" y="113" class="pct3" text-anchor="end">33%</text>
  <rect class="track" x="40" y="124" width="820" height="14"/>
  <rect x="40" y="124" width="270" height="14" rx="8" fill="url(#bar1)"/>

  <!-- Network & Systems 25% -->
  <circle cx="58" cy="168" r="6" fill="#58A6FF"/>
  <text x="78" y="173" class="label3">Network &amp; Systems</text>
  <text x="820" y="173" class="pct3" text-anchor="end">25%</text>
  <rect class="track" x="40" y="184" width="820" height="14"/>
  <rect x="40" y="184" width="205" height="14" rx="8" fill="url(#bar2)"/>

  <!-- Vulnerability Management 17% -->
  <circle cx="58" cy="228" r="6" fill="#A78BFA"/>
  <text x="78" y="233" class="label3">Vulnerability Management</text>
  <text x="820" y="233" class="pct3" text-anchor="end">17%</text>
  <rect class="track" x="40" y="244" width="820" height="14"/>
  <rect x="40" y="244" width="139" height="14" rx="8" fill="url(#bar3)"/>

  <!-- Security Operations 17% -->
  <circle cx="58" cy="288" r="6" fill="#F2CC60"/>
  <text x="78" y="293" class="label3">Security Operations</text>
  <text x="820" y="293" class="pct3" text-anchor="end">17%</text>
  <rect class="track" x="40" y="304" width="820" height="14"/>
  <rect x="40" y="304" width="139" height="14" rx="8" fill="url(#bar4)"/>

  <!-- Other 8% -->
  <circle cx="58" cy="338" r="6" fill="#F783AC"/>
  <text x="78" y="343" class="label3">Other</text>
  <text x="820" y="343" class="pct3" text-anchor="end">8%</text>
  <rect class="track" x="40" y="348" width="820" height="14"/>
  <rect x="40" y="348" width="66" height="14" rx="8" fill="url(#bar5)"/>
</svg>
